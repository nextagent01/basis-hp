<!-- ★★★ WIX「Settings → Custom Code → Head」に貼り付け ★★★ -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink:   #FF2D78;
  --cyan:   #00C8E0;
  --purple: #9B2FFF;
  --yellow: #FFB800;
  --green:  #00C875;
  --bg:     #FAFAFA;
  --dark:   #1A1A2E;
}

/* ========== 固定LINEボタン ========== */
#na-line-btn {
  position: fixed !important;
  bottom: 24px !important; right: 24px !important;
  z-index: 99999 !important;
  background: var(--green) !important;
  color: #fff !important;
  border-radius: 50px !important;
  padding: 14px 22px !important;
  font-size: 14px !important; font-weight: 900 !important;
  text-decoration: none !important;
  display: flex !important; align-items: center !important; gap: 8px !important;
  box-shadow: 0 6px 24px rgba(0,200,117,0.45) !important;
  animation: na-float 3s ease-in-out infinite !important;
  font-family: 'Noto Sans JP', sans-serif !important;
  letter-spacing: 0.5px !important;
  transition: transform .2s, box-shadow .2s !important;
}
#na-line-btn:hover {
  transform: scale(1.06) !important;
  box-shadow: 0 10px 32px rgba(0,200,117,0.6) !important;
}
@keyframes na-float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

/* ========== パーティクルCanvas ========== */
#na-particles {
  position: fixed !important; top:0 !important; left:0 !important;
  width:100% !important; height:100% !important;
  z-index: 0 !important; pointer-events: none !important;
}

/* ========== カスタムカーソル（PC only） ========== */
#na-cursor {
  width:12px; height:12px; background: var(--pink); border-radius:50%;
  position:fixed; pointer-events:none; z-index:99998;
  transform:translate(-50%,-50%);
  box-shadow: 0 0 10px rgba(255,45,120,0.6);
}
#na-cursor-ring {
  width:34px; height:34px;
  border: 2px solid rgba(255,45,120,0.4); border-radius:50%;
  position:fixed; pointer-events:none; z-index:99997;
  transform:translate(-50%,-50%);
}
@media (max-width:768px) { #na-cursor, #na-cursor-ring { display:none !important; } }

/* ========== マーキーテープ ========== */
#na-marquee {
  background: linear-gradient(90deg, var(--pink), var(--purple)) !important;
  overflow: hidden !important; white-space: nowrap !important;
  padding: 10px 0 !important; width:100% !important;
  position: relative !important; z-index: 50 !important;
}
#na-marquee-inner {
  display: inline-block !important;
  animation: na-marquee 16s linear infinite !important;
  font-size: 12px !important; font-weight: 900 !important;
  color: #fff !important; letter-spacing: 3px !important;
  font-family: 'Noto Sans JP', sans-serif !important;
}
@keyframes na-marquee {
  from { transform: translateX(0); } to { transform: translateX(-50%); }
}

/* ========== グラデーションライン ========== */
.na-line {
  height: 3px !important;
  background: linear-gradient(90deg, transparent, var(--pink), var(--purple), var(--cyan), transparent) !important;
  border-radius: 3px !important;
  width: 100% !important;
}

/* ========== スクロールフェードイン ========== */
.na-fade {
  opacity: 0 !important;
  transform: translateY(30px) !important;
  transition: opacity .8s ease, transform .8s ease !important;
}
.na-fade.na-visible {
  opacity: 1 !important;
  transform: translateY(0) !important;
}

/* ========== 投げ銭メイン実績ボックス ========== */
.na-stat-hero {
  max-width: 560px !important; margin: 0 auto 40px !important;
  background: rgba(255,255,255,0.18) !important;
  backdrop-filter: blur(12px) !important;
  border-radius: 24px !important; padding: 36px 40px !important;
  border: 2px solid rgba(255,255,255,0.5) !important;
  text-align: center !important;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15) !important;
  position: relative !important;
}
.na-stat-hero-label {
  font-size: 13px !important; font-weight: 900 !important;
  letter-spacing: 3px !important; color: rgba(255,255,255,0.85) !important;
  margin-bottom: 8px !important; display: block !important;
  font-family: 'Noto Sans JP', sans-serif !important;
}
.na-stat-hero-num {
  display: flex !important; align-items: baseline !important;
  justify-content: center !important; gap: 4px !important; line-height:1 !important;
}
.na-big-num {
  font-size: clamp(72px, 14vw, 120px) !important;
  font-weight: 900 !important;
  color: #FFB800 !important;
  text-shadow: 0 0 30px rgba(255,184,0,0.7), 0 4px 16px rgba(0,0,0,0.3) !important;
  font-family: 'Noto Sans JP', sans-serif !important;
  display: inline-block !important;
}
.na-big-unit {
  font-size: clamp(36px, 7vw, 56px) !important; font-weight: 900 !important;
  color: #fff !important; margin-left: 6px !important;
  font-family: 'Noto Sans JP', sans-serif !important;
}
.na-big-plus {
  font-size: clamp(18px, 3.5vw, 26px) !important; font-weight: 900 !important;
  color: rgba(255,255,255,0.85) !important; margin-left: 4px !important;
  align-self: flex-end !important; padding-bottom: 8px !important;
  font-family: 'Noto Sans JP', sans-serif !important;
}
.na-stat-hero-sub {
  font-size: 10px !important; letter-spacing: 4px !important;
  color: rgba(255,255,255,0.5) !important; margin-top: 10px !important;
  font-family: 'Noto Sans JP', sans-serif !important;
}
@keyframes na-gold-border {
  0%,100% { opacity:.6; } 50% { opacity:1; }
}

/* ========== ネオン見出しクラス（WIXテキストに付けて使う） ========== */
.na-text-pink   { color: var(--pink)   !important; font-weight: 900 !important; }
.na-text-purple { color: var(--purple) !important; font-weight: 900 !important; }
.na-text-green  { color: var(--green)  !important; font-weight: 900 !important; }
.na-text-yellow { color: var(--yellow) !important; font-weight: 900 !important; }

/* ========== グロウボタン ========== */
.na-btn-green {
  background: linear-gradient(135deg, var(--green), #00a860) !important;
  color: #fff !important; font-weight: 900 !important;
  border-radius: 50px !important; border: none !important;
  box-shadow: 0 8px 28px rgba(0,200,117,0.4) !important;
  transition: transform .2s, box-shadow .2s !important;
  overflow: hidden !important; position: relative !important;
}
.na-btn-green:hover {
  transform: translateY(-4px) !important;
  box-shadow: 0 14px 36px rgba(0,200,117,0.55) !important;
}

/* ========== タイプライターカーソル ========== */
.na-tw-cursor { animation: na-blink 1s infinite; color: var(--purple); }
@keyframes na-blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

/* ========== レスポンシブ ========== */
@media (max-width: 640px) {
  #na-line-btn { font-size:13px !important; padding:12px 16px !important; bottom:14px !important; right:12px !important; }
  .na-stat-hero { padding: 28px 20px !important; border-radius: 18px !important; }
  .na-big-num { font-size: 72px !important; }
  .na-big-unit { font-size: 36px !important; }
  .na-stat-hero-label { font-size: 11px !important; letter-spacing: 1px !important; }
}
</style>
